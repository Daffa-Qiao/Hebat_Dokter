version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hebat-dokter-app
    container_name: hebat-dokter-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: hebat-dokter-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hebat_dokter
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
